services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: docmind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmind_password}
      POSTGRES_DB: ${POSTGRES_DB:-docmind_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docmind} -d ${POSTGRES_DB:-docmind_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: docmind-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Milvus (Standalone) ---
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: docmind-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:latest
    container_name: docmind-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: docmind-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # --- Elasticsearch ---
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: docmind-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # --- Neo4j ---
  neo4j:
    image: neo4j:5.18-community
    container_name: docmind-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  # --- ClamAV ---
  clamav:
    image: clamav/clamav:latest
    container_name: docmind-clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav

  guardrails-sidecar:
    build:
      context: ./infra/guardrails_sidecar
    container_name: docmind-guardrails-sidecar
    ports:
      - "8090:8090"

  ragas-sidecar:
    build:
      context: ./infra/ragas_sidecar
    container_name: docmind-ragas-sidecar
    environment:
      RAGAS_PREFER_REAL: "true"
      RAGAS_LLM_BASE_URL: ${RAGAS_LLM_BASE_URL:-http://ollama:11434/v1}
      RAGAS_LLM_MODEL: ${RAGAS_LLM_MODEL:-qwen2.5:1.5b}
      RAGAS_EMBEDDING_BASE_URL: ${RAGAS_EMBEDDING_BASE_URL:-http://ollama:11434/v1}
      RAGAS_EMBEDDING_MODEL: ${RAGAS_EMBEDDING_MODEL:-nomic-embed-text}
      RAGAS_API_KEY: dummy
      RAGAS_TIMEOUT_SECONDS: "${RAGAS_TIMEOUT_SECONDS:-420}"
      RAGAS_MAX_WORKERS: "${RAGAS_MAX_WORKERS:-1}"
    ports:
      - "8091:8091"

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  es_data:
  neo4j_data:
  clamav_data:
