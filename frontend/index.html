<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DocMind，面向企业文档管理与智能问答的平台。" />
  <title>DocMind Agent - 企业文档智能平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background: #f6f3ee;
      color: #241f17;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    }

    #boot-status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, #f8f7f3 0%, #f0ebe2 100%);
      z-index: 9999;
    }

    #boot-status[data-state="ready"] {
      display: none;
    }

    .boot-card {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 252, 247, 0.96);
      border: 1px solid rgba(120, 106, 85, 0.12);
      box-shadow: 0 18px 48px rgba(32, 26, 18, 0.08);
    }

    .boot-title {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
    }

    .boot-copy {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #6d6458;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="boot-status" data-state="booting">
    <div class="boot-card">
      <h1 class="boot-title">DocMind 正在启动</h1>
      <p id="boot-message" class="boot-copy">正在加载应用资源，请稍候…</p>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
